<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Staff Portal - Fatima Farida Academy</title>
</head>
<body>

    <nav>
        <div class="logo"><h1>Fatima Farida <span>Academy</span></h1></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Support</a></li>
        </ul>
    </nav>

    <div class="login-body">
        <div class="login-card">
            <h2>Staff Login</h2>
            <p>Access the Teacher's Dashboard</p>
            
            <form action="#">
                <div class="form-group">
                    <label>Staff ID / Email</label>
                    <input type="text" placeholder="Enter your ID" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn">Secure Login</button>
            </form>
            
            <div class="extra-links">
                <a href="#">Forgot Password?</a> | <a href="contact.html">Contact Admin</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Fatima Farida Academy Staff Portal</p>
    </footer>

</body>
</html>
