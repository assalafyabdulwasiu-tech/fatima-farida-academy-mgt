<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results Manager | Fatima Farida Academy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .output-area { background: #272822; color: #f8f8f2; padding: 20px; border-radius: 5px; white-space: pre-wrap; font-family: monospace; margin-top: 20px; display: none; }
        .btn { background: #002147; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-copy { background: #2e7d32; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Add Student Result</h2>
    
    <div class="form-grid">
        <div><label>Index Number</label><input type="text" id="idx" placeholder="FFA-2026-05"></div>
        <div><label>Student Full Name</label><input type="text" id="name"></div>
        <div><label>Class</label><input type="text" id="cls" value="B.S. 2"></div>
        <div><label>Position</label><input type="text" id="pos" placeholder="1st"></div>
        <div><label>Next Term Fee (GH₵)</label><input type="number" id="fee"></div>
        <div><label>Arrears (GH₵)</label><input type="number" id="arr"></div>
    </div>

    <h3>Grades (Quick Entry)</h3>
    <p style="font-size: 11px; color: #666;">Format: Subject, ClassScore, ExamScore, Grade, Remark</p>
    <textarea id="subjectsRaw" style="width: 100%; height: 100px; padding: 10px;" placeholder="MATHEMATICS, 30, 45, 1, EXCELLENT&#10;ENGLISH, 25, 30, 3, GOOD"></textarea>

    <button class="btn" onclick="generateCode()">Generate Database Code</button>

    <div id="output" class="output-area"></div>
    <button id="copyBtn" class="btn btn-copy" onclick="copyCode()">Copy to Clipboard</button>
</div>

<script>
    function generateCode() {
        const id = document.getElementById('idx').value;
        const name = document.getElementById('name').value;
        const subjects = document.getElementById('subjectsRaw').value.split('\n');
        
        let subList = subjects.map(line => {
            const parts = line.split(',');
            if(parts.length < 5) return null;
            return `                { n: "${parts[0].trim()}", c: ${parts[1].trim()}, e: ${parts[2].trim()}, g: ${parts[3].trim()}, r: "${parts[4].trim()}" }`;
        }).filter(x => x).join(',\n');

        const code = `"${id}": {
    name: "${name}",
    class: "${document.getElementById('cls').value}",
    roll: "19",
    pos: "${document.getElementById('pos').value}",
    nextFee: "${document.getElementById('fee').value}.00",
    arrears: "${document.getElementById('arr').value}.00",
    subjects: [\n${subList}\n    ]
},`;

        const output = document.getElementById('output');
        output.innerText = code;
        output.style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copyCode() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("Code copied! Now paste it into the database section of results.html");
    }
</script>

</body>
</html>
