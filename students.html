<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Portal - Fatima Farida Academy</title>
</head>
<body>
    <nav>
        <div class="logo"><h1>Fatima Farida <span>Academy</span></h1></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="students.html" class="active">Student Info</a></li>
            <li><a href="tahfiz.html">Tahfiz</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="section-title">Student Records & Fees</h2>
        
        <div style="background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ddd; text-align: center;">
            <h3>Check Student Status</h3>
            <input type="text" placeholder="Enter Index Number (e.g. FFA-2026-001)" style="padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px;">
            <button class="btn" style="padding: 10px 20px;">Search</button>
        </div>

        <h3>General Fee Structure (2026)</h3>
        <table>
            <thead>
                <tr>
                    <th>Class</th>
                    <th>Tuition Fee (GHS)</th>
                    <th>Books & Uniform</th>
                    <th>Tahfiz Fee</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Nursery</td><td>800.00</td><td>350.00</td><td>Included</td></tr>
                <tr><td>Primary</td><td>1,200.00</td><td>450.00</td><td>100.00</td></tr>
                <tr><td>JHS</td><td>1,500.00</td><td>550.00</td><td>150.00</td></tr>
            </tbody>
        </table>
    </div>
</body>
